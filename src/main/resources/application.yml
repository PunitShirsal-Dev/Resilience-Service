spring:
  application:
    name: resilience-service

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,retries,retryevents,bulkheads,bulkheadevents,timelimiters,ratelimiters
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Resilience4j Configuration
resilience4j:
  # Circuit Breaker Configuration
  circuitbreaker:
    instances:
      orderService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2s
        event-consumer-buffer-size: 10
      paymentService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 15s
        failure-rate-threshold: 60
        slow-call-rate-threshold: 60
        slow-call-duration-threshold: 3s
      inventoryService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 20s
        failure-rate-threshold: 50

  # Retry Configuration
  retry:
    instances:
      orderService:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
      paymentService:
        max-attempts: 5
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.io.IOException
      inventoryService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 1.5

  # Time Limiter Configuration
  timelimiter:
    instances:
      orderService:
        timeout-duration: 5s
        cancel-running-future: true
      paymentService:
        timeout-duration: 10s
        cancel-running-future: true
      inventoryService:
        timeout-duration: 3s
        cancel-running-future: true

  # Bulkhead Configuration
  bulkhead:
    instances:
      orderService:
        max-concurrent-calls: 10
        max-wait-duration: 100ms
      paymentService:
        max-concurrent-calls: 5
        max-wait-duration: 200ms
      inventoryService:
        max-concurrent-calls: 15
        max-wait-duration: 50ms

  # Thread Pool Bulkhead Configuration
  thread-pool-bulkhead:
    instances:
      orderService:
        max-thread-pool-size: 4
        core-thread-pool-size: 2
        queue-capacity: 20
        keep-alive-duration: 20ms
      paymentService:
        max-thread-pool-size: 2
        core-thread-pool-size: 1
        queue-capacity: 10

  # Rate Limiter Configuration
  ratelimiter:
    instances:
      orderService:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 500ms
      paymentService:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 1s
      inventoryService:
        limit-for-period: 20
        limit-refresh-period: 1s
        timeout-duration: 100ms

# External Service URLs
external:
  services:
    order:
      url: http://localhost:8081/api/orders
    payment:
      url: http://localhost:8082/api/payments
    inventory:
      url: http://localhost:8083/api/inventory

